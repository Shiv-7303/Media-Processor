<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Media Processor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    /* ── Reset & Base ───────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f7f6f2;
      --surface:   #ffffff;
      --border:    #e4e2dc;
      --accent:    #2563eb;
      --accent-h:  #1d4ed8;
      --text:      #1c1b18;
      --muted:     #78756e;
      --success:   #16a34a;
      --error-bg:  #fff5f5;
      --error-br:  #fca5a5;
      --error-txt: #b91c1c;
      --radius:    10px;
      --shadow:    0 1px 3px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.07);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    /* ── Card ───────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 36px 32px 32px;
      width: 100%;
      max-width: 520px;
      box-shadow: var(--shadow);
    }

    /* ── Header ─────────────────────────────────────── */
    .header { margin-bottom: 28px; }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      font-size: 1.15rem;
      color: var(--text);
      margin-bottom: 4px;
    }

    .logo-icon {
      width: 28px; height: 28px;
      background: var(--accent);
      border-radius: 7px;
      display: grid;
      place-items: center;
      color: #fff;
      font-size: 13px;
    }

    .header p {
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 4px;
    }

    /* ── Form ───────────────────────────────────────── */
    .field { margin-bottom: 16px; }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: 6px;
    }

    input[type="text"], select {
      width: 100%;
      padding: 10px 13px;
      font-family: inherit;
      font-size: 0.93rem;
      color: var(--text);
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      outline: none;
      transition: border-color .18s, background .18s;
      appearance: none;
    }

    input[type="text"]::placeholder { color: #b5b2aa; }

    input[type="text"]:focus, select:focus {
      border-color: var(--accent);
      background: #fff;
    }

    .select-wrap { position: relative; }
    .select-wrap::after {
      content: "▾";
      position: absolute;
      right: 13px; top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
      font-size: 12px;
    }

    /* ── Operation pills ────────────────────────────── */
    .ops {
      display: flex;
      gap: 8px;
      margin-top: 6px;
    }

    .op-pill {
      flex: 1;
      padding: 9px 4px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg);
      font-family: inherit;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      text-align: center;
      transition: all .18s;
    }

    .op-pill:hover { border-color: var(--accent); color: var(--accent); background: #eff6ff; }

    .op-pill.active {
      border-color: var(--accent);
      background: #eff6ff;
      color: var(--accent);
      font-weight: 600;
    }

    .op-pill .pill-icon { display: block; font-size: 18px; margin-bottom: 3px; }

    /* ── Submit ─────────────────────────────────────── */
    .btn {
      width: 100%;
      margin-top: 20px;
      padding: 12px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-family: inherit;
      font-size: 0.93rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .18s, transform .12s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn:hover:not(:disabled) { background: var(--accent-h); transform: translateY(-1px); }
    .btn:active:not(:disabled) { transform: translateY(0); }
    .btn:disabled { background: #93c5fd; cursor: not-allowed; transform: none; }

    /* ── Divider ─────────────────────────────────────── */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 24px 0;
    }

    /* ── Spinner ─────────────────────────────────────── */
    .spinner-wrap {
      display: none;
      align-items: center;
      gap: 12px;
      color: var(--muted);
      font-size: 0.88rem;
    }

    .spinner {
      width: 20px; height: 20px;
      border: 2.5px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Result ─────────────────────────────────────── */
    .result-wrap { display: none; }

    .result-tag {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--success);
      text-transform: uppercase;
      letter-spacing: .07em;
      margin-bottom: 12px;
    }

    .result-tag::before {
      content: "";
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--success);
    }

    .result-wrap img,
    .result-wrap video,
    .result-wrap audio {
      width: 100%;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      display: block;
    }

    .result-wrap audio { padding: 4px 0; }

    .download-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 12px;
      padding: 8px 16px;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.82rem;
      font-weight: 600;
      text-decoration: none;
      transition: all .18s;
    }

    .download-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: #eff6ff;
    }

    /* ── Error ──────────────────────────────────────── */
    .error-wrap {
      display: none;
      background: var(--error-bg);
      border: 1px solid var(--error-br);
      border-radius: var(--radius);
      padding: 12px 14px;
      font-size: 0.86rem;
      color: var(--error-txt);
      line-height: 1.5;
    }

    /* ── Meta info ──────────────────────────────────── */
    .meta {
      margin-top: 14px;
      font-size: 0.78rem;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
    }
  </style>
</head>
<body>

<div class="card">

  <!-- Header -->
  <div class="header">
    <div class="logo">
      <div class="logo-icon">▶</div>
      Media Processor
    </div>
    <p>Paste a video URL, pick an operation, get the result.</p>
  </div>

  <!-- URL Input -->
  <div class="field">
    <label>Video URL</label>
    <input type="text" id="urlInput" placeholder="https://example.com/video.mp4" />
  </div>

  <!-- Operation Pills -->
  <div class="field">
    <label>Operation</label>
    <div class="ops">
      <button class="op-pill active" data-op="thumbnail" onclick="selectOp(this)">
        <span class="pill-icon">🖼</span>Thumbnail
      </button>
      <button class="op-pill" data-op="compress" onclick="selectOp(this)">
        <span class="pill-icon">🗜</span>Compress
      </button>
      <button class="op-pill" data-op="extract_audio" onclick="selectOp(this)">
        <span class="pill-icon">🎵</span>Audio
      </button>
    </div>
  </div>

  <!-- Submit -->
  <button class="btn" id="submitBtn" onclick="processMedia()">
    <span id="btnText">Process</span>
  </button>

  <!-- Divider (hidden until result/error) -->
  <div class="divider" id="divider" style="display:none"></div>

  <!-- Spinner -->
  <div class="spinner-wrap" id="spinner">
    <div class="spinner"></div>
    <span id="spinnerMsg">Processing...</span>
  </div>

  <!-- Error -->
  <div class="error-wrap" id="errorBox"></div>

  <!-- Result -->
  <div class="result-wrap" id="resultBox">
    <div class="result-tag">Done</div>
    <div id="resultMedia"></div>
    <a class="download-btn" id="dlBtn" href="#" download>
      ↓ Download
    </a>
    <div class="meta" id="resultMeta"></div>
  </div>

</div>

<script>
  const BACKEND = "https://media-processor-loh6.onrender.com";
  let selectedOp = "thumbnail";

  // ── Operation pill selection ──────────────────────────
  function selectOp(el) {
    document.querySelectorAll(".op-pill").forEach(p => p.classList.remove("active"));
    el.classList.add("active");
    selectedOp = el.dataset.op;
  }

  // ── Labels per operation ──────────────────────────────
  const opLabel = {
    thumbnail:     "Extracting thumbnail...",
    compress:      "Compressing video...",
    extract_audio: "Extracting audio..."
  };

  // ── Main: process media ───────────────────────────────
  async function processMedia() {
    const url = document.getElementById("urlInput").value.trim();

    resetUI();

    if (!url) { showError("Please enter a video URL."); return; }

    setLoading(true, opLabel[selectedOp] || "Processing...");

    try {
      const res = await fetch(`${BACKEND}/process`, {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body:    JSON.stringify({ url, operation: selectedOp })
      });

      const data = await res.json();

      if (data.status === "success") {
        showResult(data.output);
      } else {
        showError(data.message || "Something went wrong.");
      }

    } catch (err) {
      if (err instanceof TypeError) {
        showError("Cannot reach backend. Is it running on port 5000?");
      } else {
        showError("Request failed: " + err.message);
      }
    } finally {
      setLoading(false);
    }
  }

  // ── Show result ───────────────────────────────────────
  function showResult(outputPath) {
    const fileUrl = BACKEND + outputPath;
    const fname   = outputPath.split("/").pop();
    let   media   = "";

    if (selectedOp === "thumbnail") {
      media = `<img src="${fileUrl}" alt="Thumbnail" />`;
    } else if (selectedOp === "compress") {
      media = `<video controls><source src="${fileUrl}" type="video/mp4"></video>`;
    } else if (selectedOp === "extract_audio") {
      media = `<audio controls><source src="${fileUrl}" type="audio/mpeg"></audio>`;
    }

    document.getElementById("resultMedia").innerHTML = media;
    document.getElementById("dlBtn").href     = fileUrl;
    document.getElementById("dlBtn").download = fname;
    document.getElementById("resultMeta").textContent = fname;

    show("divider");
    show("resultBox");
  }

  // ── Show error ────────────────────────────────────────
  function showError(msg) {
    const box = document.getElementById("errorBox");
    box.textContent = "⚠ " + msg;
    show("divider");
    show("errorBox");
  }

  // ── Loading state ─────────────────────────────────────
  function setLoading(on, msg = "") {
    const btn     = document.getElementById("submitBtn");
    const spinner = document.getElementById("spinner");
    const sMsg    = document.getElementById("spinnerMsg");

    btn.disabled = on;
    document.getElementById("btnText").textContent = on ? "Processing…" : "Process";
    spinner.style.display = on ? "flex" : "none";
    if (on) { show("divider"); sMsg.textContent = msg; }
  }

  // ── Reset UI ──────────────────────────────────────────
  function resetUI() {
    ["divider","spinner","errorBox","resultBox"].forEach(id => {
      document.getElementById(id).style.display = "none";
    });
  }

  function show(id) {
    document.getElementById(id).style.display = "block";
  }

  // ── Enter key support ─────────────────────────────────
  document.getElementById("urlInput").addEventListener("keydown", e => {
    if (e.key === "Enter") processMedia();
  });
</script>

</body>
</html>
