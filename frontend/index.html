<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Media Processor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    /* ── Reset & base ───────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #F7F5F0;
      --surface:   #FFFFFF;
      --border:    #E4E0D8;
      --accent:    #2563EB;
      --accent-dk: #1D4ED8;
      --success:   #16A34A;
      --danger:    #DC2626;
      --text-1:    #111110;
      --text-2:    #6B6860;
      --text-3:    #A09D97;
      --radius:    10px;
      --shadow:    0 1px 3px rgba(0,0,0,.07), 0 4px 16px rgba(0,0,0,.05);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      color: var(--text-1);
    }

    /* ── Header ─────────────────────────────────── */
    .header {
      text-align: center;
      margin-bottom: 32px;
    }

    .header-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: 4px 12px 4px 8px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .04em;
      text-transform: uppercase;
      color: var(--text-2);
      margin-bottom: 14px;
    }

    .header-badge span { font-size: 14px; }

    h1 {
      font-size: 1.75rem;
      font-weight: 600;
      letter-spacing: -.03em;
      color: var(--text-1);
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 0.9rem;
      color: var(--text-2);
    }

    /* ── Card ───────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      width: 100%;
      max-width: 500px;
      box-shadow: var(--shadow);
    }

    /* ── Form elements ──────────────────────────── */
    .field { margin-bottom: 16px; }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: .04em;
      text-transform: uppercase;
      color: var(--text-2);
      margin-bottom: 6px;
    }

    input[type="text"],
    select {
      width: 100%;
      padding: 10px 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      color: var(--text-1);
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      outline: none;
      transition: border-color .15s, box-shadow .15s;
      appearance: none;
    }

    input[type="text"]::placeholder { color: var(--text-3); }

    input[type="text"]:focus,
    select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37,99,235,.1);
      background: #fff;
    }

    /* Custom select arrow */
    .select-wrap { position: relative; }
    .select-wrap::after {
      content: "▾";
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-3);
      pointer-events: none;
      font-size: 12px;
    }

    /* ── Operation pills ────────────────────────── */
    .op-group {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 20px;
    }

    .op-pill input[type="radio"] { display: none; }

    .op-pill label {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 10px 8px;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      transition: all .15s;
      text-transform: none;
      letter-spacing: 0;
      color: var(--text-2);
      font-size: 12px;
      font-weight: 500;
    }

    .op-pill label .icon { font-size: 18px; }

    .op-pill input:checked + label {
      border-color: var(--accent);
      background: #EFF6FF;
      color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37,99,235,.08);
    }

    .op-pill label:hover { border-color: #A5B4FC; }

    /* ── Submit button ──────────────────────────── */
    .btn {
      width: 100%;
      padding: 11px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, transform .1s;
      letter-spacing: .01em;
    }

    .btn:hover:not(:disabled) {
      background: var(--accent-dk);
      transform: translateY(-1px);
    }

    .btn:active:not(:disabled) { transform: translateY(0); }

    .btn:disabled {
      background: #93C5FD;
      cursor: not-allowed;
      transform: none;
    }

    /* ── Divider ────────────────────────────────── */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 24px 0;
    }

    /* ── Spinner ────────────────────────────────── */
    .spinner-wrap {
      display: none;
      align-items: center;
      gap: 12px;
      padding: 14px;
      background: #EFF6FF;
      border: 1px solid #BFDBFE;
      border-radius: var(--radius);
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2.5px solid #BFDBFE;
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .spinner-text {
      font-size: 0.85rem;
      color: var(--accent);
      font-weight: 500;
    }

    /* ── Error ──────────────────────────────────── */
    .error-box {
      display: none;
      padding: 12px 14px;
      background: #FEF2F2;
      border: 1px solid #FECACA;
      border-radius: var(--radius);
      font-size: 0.85rem;
      color: var(--danger);
      font-weight: 500;
    }

    /* ── Result ─────────────────────────────────── */
    .result-box { display: none; }

    .result-label {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: .04em;
      text-transform: uppercase;
      color: var(--success);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .result-label::before {
      content: "";
      width: 6px;
      height: 6px;
      background: var(--success);
      border-radius: 50%;
    }

    .result-media img,
    .result-media video,
    .result-media audio {
      width: 100%;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--bg);
      display: block;
    }

    .result-media audio { padding: 8px 0; }

    .download-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 12px;
      padding: 8px 16px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-1);
      text-decoration: none;
      transition: border-color .15s, background .15s;
    }

    .download-btn:hover {
      border-color: var(--accent);
      background: #EFF6FF;
      color: var(--accent);
    }

    /* ── Footer ─────────────────────────────────── */
    .footer {
      margin-top: 20px;
      font-size: 11px;
      color: var(--text-3);
      font-family: 'DM Mono', monospace;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-badge"><span>🎬</span> FFmpeg Powered</div>
    <h1>Media Processor</h1>
    <p class="subtitle">Paste a video URL and pick what to do with it.</p>
  </div>

  <!-- Card -->
  <div class="card">

    <!-- URL Input -->
    <div class="field">
      <label for="urlInput">Video URL</label>
      <input
        type="text"
        id="urlInput"
        placeholder="https://example.com/video.mp4"
      />
    </div>

    <!-- Operation selector pills -->
    <div class="field">
      <label>Operation</label>
      <div class="op-group">
        <div class="op-pill">
          <input type="radio" name="op" id="op-thumb" value="thumbnail" checked />
          <label for="op-thumb">
            <span class="icon">🖼️</span>Thumbnail
          </label>
        </div>
        <div class="op-pill">
          <input type="radio" name="op" id="op-compress" value="compress" />
          <label for="op-compress">
            <span class="icon">📦</span>Compress
          </label>
        </div>
        <div class="op-pill">
          <input type="radio" name="op" id="op-audio" value="extract_audio" />
          <label for="op-audio">
            <span class="icon">🎵</span>Extract Audio
          </label>
        </div>
      </div>
    </div>

    <!-- Submit -->
    <button class="btn" id="submitBtn" onclick="processMedia()">Process</button>

    <!-- Spinner -->
    <div class="divider" id="divider" style="display:none"></div>
    <div class="spinner-wrap" id="spinner">
      <div class="spinner"></div>
      <span class="spinner-text" id="spinnerText">Processing...</span>
    </div>

    <!-- Error -->
    <div class="error-box" id="errorBox"></div>

    <!-- Result -->
    <div class="result-box" id="resultBox">
      <div class="divider"></div>
      <div class="result-label">Output Ready</div>
      <div class="result-media" id="resultMedia"></div>
      <a class="download-btn" id="downloadLink" href="#" download>
        ↓ Download file
      </a>
    </div>

  </div>

  <div class="footer">backend @ localhost:5000</div>

<script>
  const BACKEND = "https://media-processor-loh6.onrender.com";

  const spinnerLabels = {
    thumbnail:     "Extracting frame at 2s...",
    compress:      "Compressing video...",
    extract_audio: "Extracting audio track..."
  };

  async function processMedia() {
    const url = document.getElementById("urlInput").value.trim();
    const op  = document.querySelector("input[name='op']:checked").value;

    resetUI();

    if (!url) { showError("Please enter a video URL."); return; }

    setLoading(true, spinnerLabels[op]);

    try {
      const res  = await fetch(`${BACKEND}/process`, {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body:    JSON.stringify({ url, operation: op })
      });

      const data = await res.json();

      if (data.status === "success") {
        showResult(data.output, op);
      } else {
        showError(data.message || "Something went wrong.");
      }

    } catch (err) {
      if (err instanceof TypeError) {
        showError("Cannot reach backend. Make sure it's running on port 5000.");
      } else {
        showError("Request failed: " + err.message);
      }
    } finally {
      setLoading(false);
    }
  }

  function setLoading(on, text = "") {
    const spinner = document.getElementById("spinner");
    const divider = document.getElementById("divider");
    document.getElementById("submitBtn").disabled = on;
    document.getElementById("spinnerText").textContent = text;
    spinner.style.display = on ? "flex" : "none";
    divider.style.display  = on ? "block" : "none";
  }

  function showError(msg) {
    const el = document.getElementById("errorBox");
    el.textContent = "⚠ " + msg;
    el.style.display = "block";
  }

  function showResult(outputPath, op) {
    const fileUrl = BACKEND + outputPath;
    let   html    = "";

    if (op === "thumbnail")     html = `<img src="${fileUrl}" alt="Thumbnail" />`;
    if (op === "compress")      html = `<video controls><source src="${fileUrl}" type="video/mp4"></video>`;
    if (op === "extract_audio") html = `<audio controls><source src="${fileUrl}" type="audio/mpeg"></audio>`;

    document.getElementById("resultMedia").innerHTML = html;

    const dl       = document.getElementById("downloadLink");
    dl.href        = fileUrl;
    dl.download    = outputPath.split("/").pop();

    document.getElementById("resultBox").style.display = "block";
  }

  function resetUI() {
    document.getElementById("errorBox").style.display  = "none";
    document.getElementById("resultBox").style.display = "none";
    document.getElementById("divider").style.display   = "none";
    document.getElementById("spinner").style.display   = "none";
  }

  // Enter key submits
  document.getElementById("urlInput")
    .addEventListener("keydown", e => { if (e.key === "Enter") processMedia(); });
</script>
</body>
</html>
